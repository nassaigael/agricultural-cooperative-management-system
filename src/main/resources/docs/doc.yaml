openapi: 3.0.3
info:
  title: Malagasy Agricultural Federation API
  version: 1.1.0
  description: |
    API for managing agricultural collectivities in Madagascar
servers:
  - url: http://localhost:8080

paths:
  /collectivities:
    get:
      tags: [Collectivities]
      summary: List all agricultural collectivities
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Collectivity'
    post:
      tags: [Collectivities]
      summary: Create a new collectivity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectivityInput'
      responses:
        '201':
          description: Collectivity created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivity'
        '403':
          description: Missing federation authorization or conditions not met

  /collectivities/{collectivityId}/members:
    post:
      tags: [Members]
      summary: Admit a new member (enhanced conditions B-2)
      description: |
        New admission conditions (2026-04-21):
        - Sponsorship by at least 2 confirmed members
        - Number of sponsors from target collectivity >= number of external sponsors
        - Payment of admission fees (50,000 Ar) + mandatory annual contributions
        - Declaration of relationship with each sponsor
      parameters:
        - name: collectivityId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Target collectivity ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnhancedMemberInput'
      responses:
        '201':
          description: Member admitted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member'
        '400':
          description: Sponsorship conditions not satisfied
        '402':
          description: Required payment not made (fees + contributions)
        '404':
          description: Collectivity or sponsor not found

  /members/{memberId}/mandates:
    post:
      tags: [Members]
      summary: Assign a specific position (1-year mandate)
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [position, year]
              properties:
                position:
                  type: string
                  enum: [PRESIDENT, VICE_PRESIDENT, TREASURER, SECRETARY]
                year:
                  type: integer
                  example: 2026
      responses:
        '201':
          description: Mandate registered successfully
        '403':
          description: Member has already served 2 mandates for this position

  /collectivities/{collectivityId}/accounts:
    get:
      tags: [Treasury]
      summary: Get account status (Cash, Bank, Mobile Money)
      parameters:
        - name: collectivityId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Account'
    post:
      tags: [Treasury]
      summary: Add a financial account
      parameters:
        - name: collectivityId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountInput'
      responses:
        '201':
          description: Account created successfully

  /collectivities/{collectivityId}/contributions:
    post:
      tags: [Treasury]
      summary: Record a contribution payment
      parameters:
        - name: collectivityId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContributionInput'
      responses:
        '201':
          description: Payment recorded successfully

  /activities:
    post:
      tags: [Activities]
      summary: Create an activity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivityInput'
      responses:
        '201':
          description: Activity scheduled successfully

  /activities/{activityId}/attendance:
    post:
      tags: [Activities]
      summary: Record attendance
      parameters:
        - name: activityId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/AttendanceInput'
      responses:
        '201':
          description: Attendance recorded successfully

  /collectivities/{collectivityId}/statistics:
    get:
      tags: [Collectivities]
      summary: Monthly report and internal statistics for collectivity
      parameters:
        - name: collectivityId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Statistics retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectivityStatistics'


  /federation/statistics:
    get:
      tags: [Federation]
      summary: Monthly global report for the federation
      description: |
        Generates a global report from data submitted by each collectivity.
        Used during annual general assemblies.
      parameters:
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Period start date
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Period end date
      responses:
        '200':
          description: Federation global report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FederationReport'
        '403':
          description: Access restricted to federation secretary

components:
  schemas:
    Collectivity:
      type: object
      properties:
        id:
          type: integer
          format: int64
        registrationNumber:
          type: string
          description: Unique registration number
        name:
          type: string
        city:
          type: string
        specialty:
          type: string
        creationDate:
          type: string
          format: date

    CollectivityInput:
      type: object
      required: [name, city, specialty, foundingMembers, federationAuthorization]
      properties:
        name:
          type: string
        city:
          type: string
        specialty:
          type: string
        federationAuthorization:
          type: boolean
        foundingMembers:
          type: array
          minItems: 10
          items:
            $ref: '#/components/schemas/FoundingMember'

    FoundingMember:
      type: object
      properties:
        memberId:
          type: integer
          format: int64
        position:
          type: string
          enum: [PRESIDENT, VICE_PRESIDENT, TREASURER, SECRETARY, SENIOR_MEMBER, JUNIOR_MEMBER]
    EnhancedMemberInput:
      type: object
      required:
        - lastName
        - firstName
        - birthDate
        - gender
        - phoneNumber
        - sponsors
        - admissionFeePaid
        - annualContributionPaid
      properties:
        lastName:
          type: string
        firstName:
          type: string
        birthDate:
          type: string
          format: date
        gender:
          type: string
          enum: [MALE, FEMALE]
        address:
          type: string
        occupation:
          type: string
        phoneNumber:
          type: string
          pattern: '^[0-9]{10}$'
        email:
          type: string
          format: email
        sponsors:
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/Sponsorship'
        admissionFeePaid:
          type: boolean
          description: Must be true with payment proof of 50,000 Ar
        annualContributionPaid:
          type: boolean
          description: Must be true (amount depends on collectivity)
        paymentProofRef:
          type: string
          description: Transaction reference or receipt

    Sponsorship:
      type: object
      required:
        - sponsorMemberId
        - sponsorCollectivityId
        - relationshipWithCandidate
      properties:
        sponsorMemberId:
          type: integer
          format: int64
          description: Sponsor member ID (must be confirmed with seniority > 90 days)
        sponsorCollectivityId:
          type: integer
          format: int64
          description: Sponsor's collectivity of affiliation
        relationshipWithCandidate:
          type: string
          enum: [FAMILY, FRIENDS, COLLEAGUES, OTHER]
          description: Nature of relationship with candidate

    Member:
      type: object
      properties:
        id:
          type: integer
          format: int64
        lastName:
          type: string
        firstName:
          type: string
        birthDate:
          type: string
          format: date
        gender:
          type: string
        phoneNumber:
          type: string
        email:
          type: string
        joinDate:
          type: string
          format: date
        status:
          type: string
          enum: [ACTIVE, FORMER, RESIGNED]
    Account:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [CASH, BANK, MOBILE_MONEY]
        balance:
          type: number
          format: float
        holder:
          type: string

    AccountInput:
      type: object
      required: [type, holder]
      properties:
        type:
          type: string
          enum: [CASH, BANK, MOBILE_MONEY]
        holder:
          type: string
        bank:
          type: string
          enum: [BRED, MCB, BMOI, BOA, BGFI, AFG, ACCES_BANQUE, BAOBAB, SIPEM]
        accountNumber:
          type: string
          pattern: '^[0-9]{23}$'
        service:
          type: string
          enum: [ORANGE_MONEY, MVOLA, AIRTEL_MONEY]
        phoneNumber:
          type: string

    ContributionInput:
      type: object
      required: [memberId, amount, paymentMode, frequency]
      properties:
        memberId:
          type: integer
          format: int64
        amount:
          type: number
        date:
          type: string
          format: date
        paymentMode:
          type: string
          enum: [CASH, TRANSFER, MOBILE_MONEY]
        frequency:
          type: string
          enum: [MONTHLY, ANNUAL, ONE_TIME]
    ActivityInput:
      type: object
      required: [title, activityType, date]
      properties:
        title:
          type: string
        activityType:
          type: string
          enum: [MONTHLY_GA, JUNIOR_TRAINING, SPECIAL]
        isMandatory:
          type: boolean
        target:
          type: string
          enum: [ALL, JUNIORS]
        date:
          type: string
          format: date-time

    AttendanceInput:
      type: object
      required: [memberId, status]
      properties:
        memberId:
          type: integer
          format: int64
        status:
          type: string
          enum: [PRESENT, ABSENT, EXCUSED]
        absenceReason:
          type: string
        isGuest:
          type: boolean
    CollectivityStatistics:
      type: object
      properties:
        globalAttendanceRate:
          type: number
          format: float
        totalActiveMembers:
          type: integer
        memberDetails:
          type: array
          items:
            $ref: '#/components/schemas/MemberStatistic'

    MemberStatistic:
      type: object
      properties:
        memberId:
          type: integer
        fullName:
          type: string
        attendanceRate:
          type: number
          format: float
        totalCollected:
          type: number
          format: float
        outstandingAmount:
          type: number
          format: float

    FederationReport:
      type: object
      required:
        - periodStart
        - periodEnd
        - generationDate
        - collectivities
      properties:
        periodStart:
          type: string
          format: date
        periodEnd:
          type: string
          format: date
        generationDate:
          type: string
          format: date-time
        collectivities:
          type: array
          items:
            $ref: '#/components/schemas/CollectivityReportItem'

    CollectivityReportItem:
      type: object
      properties:
        collectivityId:
          type: integer
        collectivityName:
          type: string
        globalAttendanceRate:
          type: number
          format: float
          description: Global attendance rate of the collectivity over the period
        contributionCompliantMembersPercentage:
          type: number
          format: float
          description: Percentage of members up to date with their contributions
        newMembers:
          type: integer
          description: Number of new members over the period
        totalMembers:
          type: integer
